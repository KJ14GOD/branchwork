name: branchwork

services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: branchwork
      POSTGRES_PASSWORD: branchwork
      POSTGRES_USER: branchwork
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U branchwork -d branchwork']
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: branchwork-local
      MINIO_ROOT_USER: branchwork
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

volumes:
  minio-data:
  postgres-data:
  redis-data:
